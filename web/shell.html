<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#190b3c">
    <title>SpinTool Web</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #080b20;
        }
        * { box-sizing: border-box; }
        html, body {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            min-width: 0;
            min-height: 0;
            margin: 0;
            padding: 0;
            overflow: hidden;
            overscroll-behavior: none;
        }
        body {
            background:
                radial-gradient(circle at 15% 10%, rgba(124, 58, 237, .32), transparent 38%),
                radial-gradient(circle at 85% 15%, rgba(37, 99, 235, .30), transparent 40%),
                #080b20;
        }
        #canvas {
            display: block;
            margin: 0;
            padding: 0;
            border: 0;
            outline: none;
            touch-action: none;
            overscroll-behavior: none;
        }
        #loading {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            z-index: 20;
            background: linear-gradient(135deg, rgba(42, 12, 83, .97), rgba(7, 42, 97, .97));
            transition: opacity .25s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .browser-prompt {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: grid;
            place-items: center;
            padding: 20px;
            background: rgba(4, 7, 24, .72);
            backdrop-filter: blur(5px);
        }
        .browser-prompt.hidden { display: none; }
        .browser-prompt-card {
            width: min(430px, 100%);
            padding: 24px;
            border: 1px solid rgba(147, 197, 253, .40);
            border-radius: 16px;
            background: linear-gradient(145deg, rgba(43, 18, 82, .98), rgba(10, 43, 91, .98));
            box-shadow: 0 24px 80px rgba(0, 0, 0, .48);
            text-align: center;
        }
        .browser-prompt-card h2 { margin: 0 0 10px; }
        .browser-prompt-card p { margin: 0 0 20px; color: #d7e5ff; }
        .browser-prompt-actions { display: flex; justify-content: center; gap: 10px; }
        .browser-prompt button {
            min-width: 120px;
            padding: 10px 16px;
            border: 1px solid rgba(191, 219, 254, .45);
            border-radius: 9px;
            background: rgba(96, 72, 196, .72);
            color: white;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .browser-prompt button.secondary { background: rgba(30, 41, 59, .85); }
        .loading-card {
            width: min(460px, calc(100vw - 40px));
            padding: 28px;
            border: 1px solid rgba(147, 197, 253, .34);
            border-radius: 18px;
            background: rgba(8, 11, 32, .78);
            box-shadow: 0 24px 80px rgba(0, 0, 0, .42);
            text-align: center;
        }
        .logo {
            margin: 0 0 8px;
            font-size: clamp(32px, 8vw, 54px);
            font-weight: 900;
            letter-spacing: .03em;
        }
        .logo .spin { color: #b68cff; }
        .logo .tool { color: #6fb7ff; }
        #status { margin: 12px 0 0; color: #d7e5ff; line-height: 1.45; }
        .bar {
            height: 7px;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255,255,255,.10);
        }
        .bar::after {
            content: "";
            display: block;
            width: 45%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #a855f7, #3b82f6);
            animation: loading 1.15s ease-in-out infinite alternate;
        }
        @keyframes loading { from { transform: translateX(-15%); } to { transform: translateX(135%); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-card">
            <h1 class="logo"><span class="spin">SPIN</span><span class="tool">TOOL</span></h1>
            <div id="status">Loading WebAssembly and browser storage…</div>
            <div class="bar"></div>
        </div>
    </div>
    <canvas id="canvas" width="1" height="1" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
    <div id="file-picker-prompt" class="browser-prompt hidden" role="dialog" aria-modal="true" aria-labelledby="file-picker-title">
        <div class="browser-prompt-card">
            <h2 id="file-picker-title">Open a local file</h2>
            <p id="file-picker-prompt-text">Choose a file to continue.</p>
            <div class="browser-prompt-actions">
                <button id="file-picker-choose" type="button">Choose file</button>
                <button id="file-picker-cancel" class="secondary" type="button">Cancel</button>
            </div>
        </div>
    </div>
    <script>
        (function () {
            function getFs() {
                if (!window.Module || !Module.FS) {
                    throw new Error('Emscripten filesystem is not ready');
                }
                return Module.FS;
            }

            function callNative(name, returnType, argumentTypes, argumentsList) {
                if (!window.Module || typeof Module.ccall !== 'function') {
                    throw new Error('SpinTool WebAssembly runtime is not ready');
                }
                return Module.ccall(name, returnType, argumentTypes, argumentsList);
            }

            function safeFileName(name) {
                var result = '';
                var source = name || 'imported-file';
                for (var index = 0; index < source.length; ++index) {
                    var code = source.charCodeAt(index);
                    result += (code === 0 || code === 47 || code === 92) ? '_' : source.charAt(index);
                }
                return result || 'imported-file';
            }

            function removeNode(node) {
                if (node && node.parentNode) {
                    node.parentNode.removeChild(node);
                }
            }

            function ensureOverlayVisible(node) {
                if (node && node.parentNode !== document.body) {
                    document.body.appendChild(node);
                }
            }

            function writeFile(requestId, targetDirectory, fileName, blob, finish) {
                var reader = new FileReader();
                reader.onerror = function () {
                    finish(new Error('Could not read the selected file'));
                };
                reader.onload = function () {
                    try {
                        var fs = getFs();
                        var bytes = new Uint8Array(reader.result);
                        fs.mkdirTree(targetDirectory);
                        var virtualPath = targetDirectory + '/' + safeFileName(fileName);
                        fs.writeFile(virtualPath, bytes);
                        callNative(
                            'spintool_web_file_selected',
                            null,
                            ['number', 'string'],
                            [requestId, virtualPath]
                        );
                        if (typeof fs.syncfs === 'function') {
                            fs.syncfs(false, function (error) {
                                if (error) {
                                    console.error('SpinTool: IndexedDB sync failed after import', error);
                                }
                            });
                        }
                        finish(null);
                    } catch (error) {
                        finish(error);
                    }
                };
                reader.readAsArrayBuffer(blob);
            }

            function convertImageToPng(file, fileName, callback) {
                var objectUrl = URL.createObjectURL(file);
                var image = new Image();
                image.onerror = function () {
                    URL.revokeObjectURL(objectUrl);
                    callback(new Error('The selected image could not be decoded'));
                };
                image.onload = function () {
                    try {
                        var canvas = document.createElement('canvas');
                        canvas.width = image.naturalWidth || image.width;
                        canvas.height = image.naturalHeight || image.height;
                        var context = canvas.getContext('2d', { alpha: true });
                        if (!context) {
                            throw new Error('The browser could not create a 2D canvas');
                        }
                        context.drawImage(image, 0, 0);
                        canvas.toBlob(function (blob) {
                            URL.revokeObjectURL(objectUrl);
                            if (!blob) {
                                callback(new Error('PNG conversion failed'));
                                return;
                            }
                            var dot = fileName.lastIndexOf('.');
                            var pngName = (dot > 0 ? fileName.substring(0, dot) : fileName) + '.png';
                            callback(null, blob, pngName);
                        }, 'image/png');
                    } catch (error) {
                        URL.revokeObjectURL(objectUrl);
                        callback(error);
                    }
                };
                image.src = objectUrl;
            }

            window.SpinToolWeb = {
                openFilePicker: function (requestId, accept, targetDirectory) {
                    var input = document.createElement('input');
                    var completed = false;
                    var selectionStarted = false;
                    var prompt = document.getElementById('file-picker-prompt');
                    var promptText = document.getElementById('file-picker-prompt-text');
                    var chooseButton = document.getElementById('file-picker-choose');
                    var cancelButton = document.getElementById('file-picker-cancel');

                    input.type = 'file';
                    input.accept = accept || '';
                    input.style.display = 'none';

                    function hidePrompt() {
                        if (prompt) {
                            prompt.classList.add('hidden');
                        }
                    }

                    function cancelRequest() {
                        hidePrompt();
                        if (!completed) {
                            completed = true;
                            try {
                                callNative(
                                    'spintool_web_file_cancelled',
                                    null,
                                    ['number'],
                                    [requestId]
                                );
                            } catch (error) {
                                console.error('SpinTool: could not cancel the file request', error);
                            }
                        }
                        removeNode(input);
                    }

                    function completeImport(file, fileName) {
                        writeFile(requestId, targetDirectory, fileName, file, function (error) {
                            if (error) {
                                console.error('SpinTool: could not import selected file', error);
                                cancelRequest();
                                return;
                            }
                            completed = true;
                            hidePrompt();
                            removeNode(input);
                        });
                    }

                    function showPrompt() {
                        if (!prompt || !chooseButton || !cancelButton) {
                            return false;
                        }
                        // SDL's fill-document mode hides the original page nodes.
                        // Move the fallback picker overlay back above the canvas.
                        ensureOverlayVisible(prompt);
                        if (promptText) {
                            promptText.textContent = accept
                                ? 'Choose a file (' + accept + ') to continue.'
                                : 'Choose a file to continue.';
                        }
                        prompt.classList.remove('hidden');
                        chooseButton.onclick = function () {
                            hidePrompt();
                            launchPicker();
                        };
                        cancelButton.onclick = function () {
                            cancelRequest();
                        };
                        return true;
                    }

                    function onWindowFocus() {
                        window.setTimeout(function () {
                            if (!completed && !selectionStarted) {
                                cancelRequest();
                            }
                        }, 350);
                    }

                    function launchPicker() {
                        if (!input.parentNode) {
                            document.body.appendChild(input);
                        }
                        window.addEventListener('focus', onWindowFocus, { once: true });
                        input.click();
                        window.setTimeout(function () {
                            if (!completed && !selectionStarted && document.hasFocus()) {
                                showPrompt();
                            }
                        }, 700);
                    }

                    input.addEventListener('cancel', cancelRequest, { once: true });
                    input.addEventListener('change', function () {
                        selectionStarted = true;
                        var file = input.files && input.files.length ? input.files[0] : null;
                        if (!file) {
                            cancelRequest();
                            return;
                        }

                        var name = safeFileName(file.name);
                        var lowerName = name.toLowerCase();
                        var isImage = (file.type && file.type.indexOf('image/') === 0) ||
                            /[.](png|gif|bmp|jpe?g|webp)$/.test(lowerName);

                        if (isImage && lowerName.slice(-4) !== '.png') {
                            convertImageToPng(file, name, function (error, pngBlob, pngName) {
                                if (error) {
                                    console.error('SpinTool: image conversion failed', error);
                                    cancelRequest();
                                    return;
                                }
                                completeImport(pngBlob, pngName);
                            });
                        } else {
                            completeImport(file, name);
                        }
                    }, { once: true });

                    if (navigator.userActivation && !navigator.userActivation.isActive) {
                        if (!showPrompt()) {
                            launchPicker();
                        }
                    } else {
                        launchPicker();
                    }
                },

                syncFilesystem: function () {
                    try {
                        var fs = getFs();
                        if (typeof fs.syncfs === 'function') {
                            fs.syncfs(false, function (error) {
                                if (error) {
                                    console.error('SpinTool: IndexedDB sync failed', error);
                                }
                            });
                        }
                    } catch (error) {
                        console.error('SpinTool: filesystem sync failed', error);
                    }
                },

                downloadFile: function (path, mimeType, requestedName) {
                    try {
                        var bytes = getFs().readFile(path, { encoding: 'binary' });
                        var blob = new Blob([bytes], {
                            type: mimeType || 'application/octet-stream'
                        });
                        var anchor = document.createElement('a');
                        var objectUrl = URL.createObjectURL(blob);
                        var slash = path.lastIndexOf('/');
                        var fallbackName = slash >= 0 ? path.substring(slash + 1) : path;
                        anchor.href = objectUrl;
                        anchor.download = requestedName || fallbackName || 'spintool-export.bin';
                        anchor.style.display = 'none';
                        document.body.appendChild(anchor);
                        anchor.click();
                        window.setTimeout(function () {
                            URL.revokeObjectURL(objectUrl);
                            removeNode(anchor);
                        }, 1000);
                        return true;
                    } catch (error) {
                        console.error('SpinTool: download failed', error);
                        return false;
                    }
                }
            };
        }());

        var loading = document.getElementById('loading');
        var statusNode = document.getElementById('status');

        var Module = {
            canvas: document.getElementById('canvas'),
            print: function () { console.log.apply(console, arguments); },
            printErr: function () { console.error.apply(console, arguments); },
            setStatus: function (text) {
                if (text) {
                    statusNode.textContent = text;
                }
            },
            preRun: [function () {
                Module.setStatus('Opening persistent browser storage…');
                Module.FS.mkdirTree('/spintool');
                Module.FS.mount(Module.IDBFS, { autoPersist: true }, '/spintool');
                Module.addRunDependency('spintool-idbfs');
                Module.FS.syncfs(true, function (error) {
                    if (error) {
                        console.error('SpinTool: could not restore IndexedDB storage', error);
                    }
                    Module.removeRunDependency('spintool-idbfs');
                });
            }],
            onRuntimeInitialized: function () {
                Module.setStatus('Starting SpinTool…');
                requestAnimationFrame(function () {
                    loading.classList.add('hidden');
                });
            },
            onAbort: function (reason) {
                ensureOverlayVisible(loading);
                loading.classList.remove('hidden');
                statusNode.textContent = 'SpinTool could not start: ' + reason;
            }
        };

        window.addEventListener('beforeunload', function () {
            try {
                if (Module.FS && typeof Module.FS.syncfs === 'function') {
                    Module.FS.syncfs(false, function () {});
                }
            } catch (error) {
                console.error('SpinTool: final filesystem sync failed', error);
            }
        });
    </script>
    {{{ SCRIPT }}}
</body>
</html>
